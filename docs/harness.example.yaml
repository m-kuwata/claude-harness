# harness.yaml サンプル（最小構成 + 主要機能）
# フルリファレンス: docs/schema-v0.md
version: 0

project:
  name: myapp

paths:
  impl:
    include: ["src/**/*.{ts,tsx}"]
    exclude: ["**/*.{test,spec,stories}.{ts,tsx}"]
  screen:
    include: ["src/app/**/*.tsx"]
    exclude: ["**/*.{test,spec,stories}.tsx"]
  test:
    include: ["**/*.{test,spec}.{ts,tsx}"]
  exempt:
    include: [".claude/**", "docs/**", "*.md"]

tickets:
  provider: github-issues
  branch_format: "{type}/{n}-{slug}"
  protected_branches: [main]
  allow_branch_prefixes: [claude/]
  escape_env: SKIP_ISSUE_CHECK
  exempt: [exempt, test]

ci:
  on_edit:
    - paths: ["**/*.{ts,tsx}"]
      run: "npx eslint {file}"
  on_commit:
    - run: "npm run test:coverage"
      coverage_min: 80
    - run: "npx tsc --noEmit"

personas:
  planner:
    agent: harness:planner
    context: [CLAUDE.md, docs/architecture.md]
  qa:
    agent: harness:qa-reviewer
    context: [CLAUDE.md]
  po:
    agent: harness:po-reviewer
    context: [docs/product-context.md]
  architect:
    agent: harness:architect-reviewer
    context: [docs/architecture.md]

workflows:
  implement:
    default: true
    description: issue 駆動の実装
    permissions: edit
    entry:
      require_ticket: true
      gates:
        # Anthropic の harness 設計記事（Planner/Generator/Evaluator）に倣い、
        # 着手前に独立コンテキストのプランナーへスコープを切らせる。
        # plan は entry ゲートなので、計画が通るまで実装ファイルの編集自体が
        # ブロックされる（Sprint contracts: 実装前に計画を確定させる）。
        - skill: plan
          agent: planner
          verify: "bash ${HARNESS_PLUGIN_ROOT}/scripts/verify-plan.sh .claude-harness/{session_id}/plan/report.md"
        - skill: tdd
    gates:
      # agent: を設定すると、このゲートは review-board と同様に独立コンテキストの
      # サブエージェントとして実行される（/gate-run 経由）。未設定なら従来どおり
      # メインコンテキストで /refactor を直接実行する（後方互換）。
      - skill: refactor
        when: impl
        agent: architect
      - skill: project-review
        when: impl
      - skill: review-board
        when: impl
        personas: [qa, po]
        # verify: トークンの自己申告だけでなく、review-board が書き出す
        # アーティファクトの all_approved を機械的に確認する。
        # {session_id} は複数セッション同時実行での衝突を避けるため必須。
        # 未設定でも動く（後方互換）が、レビュー系ゲートには設定を推奨。
        # ${HARNESS_PLUGIN_ROOT} はエンジンが verify/run コマンド実行時に必ず
        # export する変数（${CLAUDE_PLUGIN_ROOT} とは別物。lib.sh 参照）。
        verify: "bash ${HARNESS_PLUGIN_ROOT}/scripts/verify-approved.sh .claude-harness/{session_id}/review-board/findings.json"
      - skill: design-check
        when: screen
        optional: true

  investigate:
    description: コードを変更しない調査
    permissions: read-only
    gates:
      - skill: report
        output: "docs/research/{date}-{slug}.md"
